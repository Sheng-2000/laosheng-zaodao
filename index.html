<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>老盛早知道 - 每日快讯</title>
<style>
/* ══════════ CSS VARIABLES ══════════ */
:root {
  --bg-primary:#0d1117;
  --bg-secondary:#161b22;
  --bg-card:#1c2333;
  --bg-hover:#21273a;
  --accent:#00d4ff;
  --accent-dim:rgba(0,212,255,0.15);
  --accent-border:rgba(0,212,255,0.35);
  --green:#3fb950;
  --red:#f85149;
  --yellow:#d29922;
  --purple:#bc8cff;
  --orange:#ffa657;
  --text-primary:#e6edf3;
  --text-secondary:#8b949e;
  --text-muted:#6e7681;
  --border:rgba(48,54,61,0.8);
  --radius:12px;
  --radius-sm:8px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,'SF Pro Text','PingFang SC','Noto Sans SC',sans-serif;
  background:var(--bg-primary);
  color:var(--text-primary);
  line-height:1.7;
  min-height:100vh;
  background-image:
    radial-gradient(ellipse 80% 40% at 50% -5%, rgba(0,80,160,0.14) 0%, transparent 60%),
    repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,212,255,0.008) 3px, rgba(0,212,255,0.008) 4px);
  -webkit-font-smoothing:antialiased;
}

/* ══════════ PASSWORD GATE ══════════ */
.pw-overlay {
  position:fixed;inset:0;z-index:9999;
  background:var(--bg-primary);
  display:flex;align-items:center;justify-content:center;
  transition:opacity 0.6s ease, visibility 0.6s ease;
  overflow:hidden;
}
.pw-overlay.hidden { opacity:0;pointer-events:none;visibility:hidden; }

.pw-overlay::before {
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(circle 300px at 20% 30%, rgba(0,212,255,0.06) 0%, transparent 70%),
    radial-gradient(circle 250px at 80% 70%, rgba(188,140,255,0.05) 0%, transparent 70%),
    radial-gradient(circle 200px at 50% 50%, rgba(0,212,255,0.03) 0%, transparent 70%);
  animation:pw-bg-drift 12s ease-in-out infinite alternate;
}
@keyframes pw-bg-drift {
  0% { transform:scale(1) translate(0,0); }
  50% { transform:scale(1.1) translate(-2%,3%); }
  100% { transform:scale(1) translate(2%,-2%); }
}

.pw-particles {
  position:absolute;inset:0;overflow:hidden;pointer-events:none;
}
.pw-particle {
  position:absolute;width:3px;height:3px;border-radius:50%;
  background:var(--accent);opacity:0;
  animation:pw-float linear infinite;
}
.pw-particle:nth-child(1) { left:10%;top:80%;animation-duration:14s;animation-delay:0s;width:2px;height:2px; }
.pw-particle:nth-child(2) { left:25%;top:90%;animation-duration:18s;animation-delay:2s;background:var(--purple); }
.pw-particle:nth-child(3) { left:45%;top:85%;animation-duration:12s;animation-delay:4s;width:4px;height:4px; }
.pw-particle:nth-child(4) { left:65%;top:95%;animation-duration:16s;animation-delay:1s;background:var(--purple); }
.pw-particle:nth-child(5) { left:80%;top:88%;animation-duration:20s;animation-delay:3s;width:2px;height:2px; }
.pw-particle:nth-child(6) { left:35%;top:92%;animation-duration:15s;animation-delay:5s; }
.pw-particle:nth-child(7) { left:55%;top:82%;animation-duration:17s;animation-delay:6s;background:var(--green);width:2px;height:2px; }
.pw-particle:nth-child(8) { left:90%;top:75%;animation-duration:13s;animation-delay:7s;background:var(--green); }
@keyframes pw-float {
  0% { transform:translateY(0) translateX(0);opacity:0; }
  10% { opacity:0.6; }
  90% { opacity:0.3; }
  100% { transform:translateY(-100vh) translateX(30px);opacity:0; }
}

.pw-overlay::after {
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,212,255,0.015) 2px, rgba(0,212,255,0.015) 4px
  );
  pointer-events:none;
}

.pw-box {
  text-align:center;max-width:380px;width:90%;padding:44px 36px;
  background:rgba(22,27,34,0.85);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(0,212,255,0.2);
  border-radius:20px;
  box-shadow:0 0 80px rgba(0,212,255,0.06),0 0 0 1px rgba(0,212,255,0.05),inset 0 1px 0 rgba(255,255,255,0.04);
  position:relative;z-index:1;
  animation:pw-box-in 0.8s ease forwards;
}
@keyframes pw-box-in {
  from { opacity:0;transform:translateY(30px) scale(0.96); }
  to { opacity:1;transform:translateY(0) scale(1); }
}

.pw-box::before {
  content:'';position:absolute;top:-1px;left:20%;right:20%;height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),var(--purple),transparent);
  border-radius:2px;
}

.pw-box .pw-icon {
  width:60px;height:60px;margin:0 auto 22px;
  background:linear-gradient(145deg,rgba(0,212,255,0.08),rgba(0,212,255,0.02));
  border:1px solid rgba(0,212,255,0.25);border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 30px rgba(0,212,255,0.15);
  position:relative;
}
.pw-box .pw-icon::after {
  content:'';position:absolute;inset:-6px;border-radius:20px;
  border:1px solid rgba(0,212,255,0.06);
  animation:pw-icon-ring 3s ease-in-out infinite;
}
@keyframes pw-icon-ring {
  0%,100% { transform:scale(1);opacity:0.5; }
  50% { transform:scale(1.08);opacity:1; }
}
.pw-box .pw-icon svg { width:28px;height:28px; }

.pw-box h2 { font-size:20px;font-weight:700;color:var(--text-primary);margin-bottom:6px;letter-spacing:2px; }
.pw-box p { font-size:13px;color:var(--text-muted);margin-bottom:28px; }
.pw-box input[type="password"] {
  width:100%;padding:14px 18px;font-size:16px;
  background:rgba(13,17,23,0.8);
  border:1px solid rgba(48,54,61,0.8);
  border-radius:10px;color:var(--text-primary);
  outline:none;letter-spacing:6px;text-align:center;
  transition:all 0.3s ease;
}
.pw-box input[type="password"]:focus {
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(0,212,255,0.1),0 0 20px rgba(0,212,255,0.08);
}
.pw-box input[type="password"]::placeholder { letter-spacing:1px;color:var(--text-muted);font-size:14px; }

.pw-box .pw-btn {
  margin-top:18px;width:100%;padding:13px;font-size:14px;font-weight:600;
  background:linear-gradient(135deg,#00d4ff,#0099cc);
  color:#0d1117;border:none;border-radius:10px;cursor:pointer;
  letter-spacing:3px;transition:all 0.3s ease;
  position:relative;overflow:hidden;
}
.pw-box .pw-btn::before {
  content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);
  transition:left 0.5s ease;
}
.pw-box .pw-btn:hover::before { left:100%; }
.pw-box .pw-btn:hover {
  box-shadow:0 0 30px rgba(0,212,255,0.35);transform:translateY(-2px);
}
.pw-box .pw-btn:active { transform:translateY(0); }

.pw-box .pw-error {
  color:var(--red);font-size:12px;margin-top:14px;min-height:18px;
  transition:opacity 0.3s;
}

/* ══════════ HEADER ══════════ */
.header {
  background:linear-gradient(180deg, #080e18 0%, #0a1422 100%);
  border-bottom:1px solid rgba(0,212,255,0.18);
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 40px rgba(0,0,0,0.7),0 1px 0 rgba(0,212,255,0.12);
  overflow:hidden;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}
.header::before {
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent 0%,var(--accent) 25%,var(--purple) 75%,transparent 100%);
  box-shadow:0 0 18px var(--accent);
}

.header::after {
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
  background-size:60px 60px;
  animation:header-grid-move 20s linear infinite;
  pointer-events:none;
}
@keyframes header-grid-move {
  0% { transform:translate(0,0); }
  100% { transform:translate(60px,60px); }
}

.header-inner {
  max-width:1200px;
  margin:0 auto;
  padding:18px 24px 16px;
  position:relative;z-index:1;
}

.header-top {
  display:grid;
  grid-template-columns:auto 1fr auto;
  align-items:center;
  gap:16px;
}

/* ══ BRAND ICON ══ */
.brand-icon {
  width:56px;height:56px;
  background:linear-gradient(145deg,#0a1e35 0%,#0d2040 60%,#091828 100%);
  border:1px solid rgba(0,212,255,0.38);
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 20px rgba(0,212,255,0.25),inset 0 1px 0 rgba(255,255,255,0.08);
  flex-shrink:0;
  position:relative;
  overflow:hidden;
}
.brand-icon::before {
  content:'';position:absolute;top:-4px;left:-4px;width:24px;height:24px;
  background:radial-gradient(circle,rgba(0,212,255,0.22) 0%,transparent 70%);
}
.brand-icon::after {
  content:'';position:absolute;inset:0;border-radius:14px;
  background:linear-gradient(135deg,rgba(0,212,255,0.08) 0%,transparent 55%);
}
.brand-icon svg { width:28px;height:28px;position:relative;z-index:1; }

/* ══ BRAND TITLE ══ */
.brand-title {
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:4px;
  line-height:1.2;
  min-width:0;
}

.brand-main-row {
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}

.brand-signal {
  position:relative;
  display:inline-flex;
  align-items:center;
  cursor:default;
}

.brand-name {
  font-size:22px;
  font-weight:800;
  letter-spacing:3px;
  color:#e6edf3;
}
.brand-sep {
  position:relative;
  width:2px;
  height:18px;
  background:rgba(0,212,255,0.15);
  margin:0 8px;
  border-radius:1px;
}
.brand-sep::after {
  content:'';position:absolute;left:-1.5px;width:5px;height:5px;border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 8px rgba(0,212,255,0.8);
  animation:sep-slide 3s ease-in-out infinite;
}
.brand-zaodao {
  font-size:22px;
  font-weight:300;
  letter-spacing:3px;
  color:var(--accent);
  text-shadow:0 0 16px rgba(0,212,255,0.3);
}
@keyframes sep-slide { 0%{top:0;opacity:0} 15%{opacity:1} 50%{top:14px;opacity:1} 85%{opacity:1} 100%{top:0;opacity:0} }

.brand-en {
  font-size:9px;font-weight:600;letter-spacing:2px;
  color:var(--accent);opacity:0.5;text-transform:uppercase;
  font-family:'SF Mono','Fira Code','Consolas',monospace;
  margin-bottom:2px;
}

.brand-tag {
  font-size:10px;color:var(--text-muted);
  opacity:0.6;
  white-space:nowrap;
}

.brand-subtitle {
  font-size:10.5px;
  color:var(--text-muted);
  display:flex;
  align-items:center;
  gap:4px;
  flex-wrap:wrap;
  margin-top:2px;
}
.brand-subtitle .dot { color:rgba(0,212,255,0.25);margin:0 4px; }

.live-dot {
  display:inline-block;width:6px;height:6px;
  background:var(--green);border-radius:50%;
  box-shadow:0 0 6px var(--green);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.7)} }

/* ══ HEADER META ══ */
.header-meta {
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:4px;
  flex-shrink:0;
  padding-left:16px;
  border-left:1px solid rgba(0,212,255,0.1);
}
.hm-date {
  font-size:18px;
  font-weight:700;
  letter-spacing:1px;
  color:var(--accent);
  line-height:1;
  text-shadow:0 0 12px rgba(0,212,255,0.4);
  font-family:'SF Mono','Fira Code','Consolas',monospace;
}
.hm-sub {
  font-size:10px;
  color:var(--text-muted);
  display:flex;
  align-items:center;
  gap:4px;
  white-space:nowrap;
}
.hm-sub .sep { color:rgba(0,212,255,0.2); }

/* ══════════ CONTENT ══════════ */
.main-content { max-width:1200px;margin:0 auto;padding:32px 24px 0; }

.section-title {
  font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--accent);padding-left:12px;border-left:2px solid var(--accent);margin-bottom:20px;
  display:flex;align-items:center;gap:10px;
}
.section-title::after {
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,rgba(0,212,255,0.2),transparent);
}

/* ══════════ HERO CARD (最新一期) ══════════ */
.hero-card {
  position:relative;
  background:var(--bg-card);
  border-radius:14px;
  margin-bottom:36px;
  overflow:hidden;
  transition:transform 0.3s ease, box-shadow 0.3s ease;
  cursor:pointer;
  text-decoration:none;
  display:block;
  -webkit-tap-highlight-color:transparent;
}

.hero-card-border {
  position:absolute;inset:0;border-radius:14px;padding:1.5px;
  background:linear-gradient(135deg,var(--accent),var(--purple),var(--accent));
  background-size:200% 200%;
  animation:hero-border-shift 6s ease-in-out infinite;
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  pointer-events:none;
}
@keyframes hero-border-shift {
  0%,100% { background-position:0% 50%; }
  50% { background-position:100% 50%; }
}

.hero-card::before {
  content:'';position:absolute;top:0;left:0;right:0;height:100px;
  background:linear-gradient(180deg,rgba(0,212,255,0.05) 0%,transparent 100%);
  pointer-events:none;z-index:1;
}

.hero-card:active {
  transform:scale(0.99);
}

.hero-card-inner {
  display:flex;
  align-items:stretch;
  position:relative;
  z-index:2;
}

.hero-date-block {
  flex-shrink:0;
  width:140px;
  background:linear-gradient(160deg,rgba(0,212,255,0.08) 0%,rgba(0,212,255,0.02) 100%);
  border-right:1px solid rgba(0,212,255,0.1);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:24px 16px;
  gap:2px;
  position:relative;
}
.hero-date-block::before {
  content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:32px;height:3px;border-radius:2px;
  background:linear-gradient(90deg,var(--accent),var(--purple));
}

.hero-date-day {
  font-size:52px;font-weight:900;line-height:1;
  color:var(--text-primary);
  font-family:'SF Mono','Fira Code','Consolas',monospace;
  text-shadow:0 0 24px rgba(0,212,255,0.2);
}
.hero-date-month {
  font-size:14px;font-weight:600;color:var(--accent);letter-spacing:1px;
}
.hero-date-weekday {
  font-size:11px;color:var(--text-muted);margin-top:6px;
  background:rgba(0,212,255,0.08);padding:3px 10px;border-radius:20px;
}

.hero-content-block {
  flex:1;
  padding:20px 24px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:10px;
  min-width:0;
}

.hero-badge-row {
  display:flex;align-items:center;gap:8px;
}
.hero-badge {
  display:inline-flex;align-items:center;gap:4px;
  background:linear-gradient(135deg,var(--accent),#0099cc);
  color:#0d1117;font-size:9px;font-weight:800;
  padding:3px 10px;border-radius:20px;letter-spacing:1px;
  text-transform:uppercase;
}
.hero-badge-dot {
  width:4px;height:4px;border-radius:50%;background:#0d1117;
  animation:pulse 1.5s ease-in-out infinite;
}
.hero-label {
  font-size:10px;color:var(--text-muted);
}

.hero-title {
  font-size:16px;font-weight:700;color:var(--text-primary);
  line-height:1.5;
  transition:color 0.3s;
  word-break:break-word;
}

.hero-tags {
  display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;
}
.hero-tag {
  font-size:10px;padding:2px 10px;border-radius:4px;
  background:rgba(0,212,255,0.06);
  border:1px solid rgba(0,212,255,0.12);
  color:var(--text-secondary);
  transition:all 0.3s;
}
.hero-tag:nth-child(1) { border-color:rgba(0,212,255,0.25);color:var(--accent); }
.hero-tag:nth-child(2) { border-color:rgba(188,140,255,0.25);color:var(--purple); }
.hero-tag:nth-child(3) { border-color:rgba(63,185,80,0.25);color:var(--green); }

.hero-read-btn {
  display:inline-flex;align-items:center;gap:6px;
  margin-top:4px;
  font-size:12px;font-weight:600;color:var(--accent);
  transition:all 0.3s;
  align-self:flex-start;
}
.hero-read-btn .arrow {
  display:inline-block;
  transition:transform 0.3s;
}
.hero-card:hover .hero-read-btn .arrow { transform:translateX(4px); }

/* ══════════ ARCHIVE TIMELINE ══════════ */
.archive-section { margin-top:8px; }

.archive-timeline {
  position:relative;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:0 32px;
}

.archive-timeline::before {
  content:'';position:absolute;
  left:50%;top:8px;bottom:8px;width:1px;
  background:linear-gradient(180deg,transparent,var(--accent-border),var(--border),transparent);
  transform:translateX(-50%);
}

.timeline-item {
  position:relative;
  padding:0 0 16px 0;
  display:flex;
  align-items:flex-start;
  gap:14px;
  text-decoration:none;
  transition:all 0.3s ease;
  -webkit-tap-highlight-color:transparent;
}

.timeline-item:nth-child(odd) {
  flex-direction:row-reverse;
  text-align:right;
  padding-right:20px;
  grid-column:1;
  justify-self:end;
  width:100%;
}
.timeline-item:nth-child(even) {
  padding-left:20px;
  grid-column:2;
  width:100%;
}

.timeline-dot {
  position:absolute;
  top:6px;
  width:10px;height:10px;border-radius:50%;
  background:var(--bg-primary);
  border:2px solid var(--border);
  transition:all 0.3s;
  z-index:2;
}
.timeline-item:nth-child(odd) .timeline-dot { right:-5px; }
.timeline-item:nth-child(even) .timeline-dot { left:-5px; }

.timeline-content {
  flex:1;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:14px 16px;
  transition:all 0.3s ease;
  position:relative;
  overflow:hidden;
  min-width:0;
}
.timeline-content::before {
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent),var(--purple));
  opacity:0;transition:opacity 0.3s;
}
.timeline-item:hover .timeline-content {
  border-color:var(--accent-border);
  box-shadow:0 6px 20px rgba(0,0,0,0.3);
}
.timeline-item:hover .timeline-content::before { opacity:1; }

.timeline-item:active .timeline-content {
  background:var(--bg-hover);
}

.tl-header {
  display:flex;justify-content:space-between;align-items:center;gap:8px;
  margin-bottom:6px;
  flex-wrap:wrap;
}
.timeline-item:nth-child(odd) .tl-header { flex-direction:row-reverse; }

.tl-date {
  font-size:13px;font-weight:700;color:var(--text-primary);
  font-family:'SF Mono','Menlo',monospace;
  transition:color 0.3s;
  white-space:nowrap;
}
.timeline-item:hover .tl-date { color:var(--accent); }

.tl-weekday {
  font-size:10px;color:var(--text-muted);
  background:rgba(0,212,255,0.06);
  padding:2px 8px;border-radius:4px;
  white-space:nowrap;
}
.tl-title {
  font-size:12px;color:var(--text-secondary);line-height:1.5;
  transition:color 0.3s;
  word-break:break-word;
}
.timeline-item:hover .tl-title { color:var(--text-primary); }

.tl-arrow {
  display:inline-block;font-size:10px;color:var(--accent);
  margin-top:4px;transition:all 0.3s;
  opacity:0;transform:translateX(-4px);
}
.timeline-item:hover .tl-arrow { opacity:1;transform:translateX(0); }
.timeline-item:nth-child(odd) .tl-arrow { transform:translateX(4px); }
.timeline-item:nth-child(odd):hover .tl-arrow { transform:translateX(0); }

// ══════════ 密码锁 ══════════
(function() {
  const _0x1a = [78,85,74,123,79,69,86,51,79,123,104,62];
  const _0x1b = _0x1a.map(function(c){return String.fromCharCode(c - 1)}).join('');
  const KEY = 'lszd_auth';

  // 检查 session 认证
  if (sessionStorage.getItem(KEY) === 'ok') {
    document.getElementById('pw-overlay').style.display = 'none';
    return;
  }

  function verify(pwd) {
    return btoa(pwd) === _0x1b;
  }

  window.checkPassword = function() {
    var input = document.getElementById('pw-input');
    var error = document.getElementById('pw-error');
    var val = input.value.trim();
    if (!val) { error.textContent = '请输入密码'; return; }
    if (verify(val)) {
      sessionStorage.setItem(KEY, 'ok');
      document.getElementById('pw-overlay').classList.add('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      error.textContent = '密码错误，请重试';
      input.value = '';
      input.focus();
    }
  };

  document.getElementById('pw-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); window.checkPassword(); }
  });

  document.getElementById('pw-input').focus();
})();
