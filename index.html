<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>老盛早知道 · 历史报告</title>
<style>
  :root {
    --bg-primary: #0d1117;
    --bg-secondary: #161b22;
    --bg-card: #1c2333;
    --bg-hover: #21273a;
    --accent: #00d4ff;
    --accent-dim: rgba(0,212,255,0.15);
    --accent-border: rgba(0,212,255,0.35);
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --purple: #bc8cff;
    --orange: #ffa657;
    --text-primary: #e6edf3;
    --text-secondary: #b0bac4;
    --text-muted: #8b95a5;
    --border: rgba(48,54,61,0.8);
    --radius: 10px;
    --radius-sm: 6px;
  }
  
  * { margin:0; padding:0; box-sizing:border-box; }
  
  body {
    font-family: -apple-system, 'SF Pro Text', 'PingFang SC', 'Noto Sans SC', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    font-size: 15px;
    line-height: 1.7;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 40% at 50% -5%, rgba(0,80,160,0.14) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,212,255,0.008) 3px, rgba(0,212,255,0.008) 4px);
  }
  
  /* Header */
  .header {
    background: linear-gradient(180deg, #080e18 0%, #0a1422 100%);
    border-bottom: 1px solid rgba(0,212,255,0.18);
    padding: 40px 0 30px;
    position: relative;
    overflow: hidden;
  }
  
  .header::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent 0%, var(--accent) 25%, var(--purple) 75%, transparent 100%);
    box-shadow: 0 0 18px var(--accent), 0 0 36px rgba(0,212,255,0.25);
  }
  
  .header::after {
    content: '';
    position: absolute;
    bottom: -50px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 200px;
    background: radial-gradient(ellipse, rgba(0,212,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 40px;
    position: relative;
    z-index: 1;
  }
  
  .brand {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 30px;
  }
  
  .brand-icon {
    width: 72px;
    height: 72px;
    background: linear-gradient(145deg, #0a1e35 0%, #0d2040 60%, #091828 100%);
    border: 1px solid rgba(0,212,255,0.38);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 28px rgba(0,212,255,0.32), 0 0 8px rgba(0,212,255,0.12), inset 0 1px 0 rgba(255,255,255,0.08);
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }
  
  .brand-icon::before {
    content: '';
    position: absolute;
    top: -4px;
    left: -4px;
    width: 32px;
    height: 32px;
    background: radial-gradient(circle, rgba(0,212,255,0.22) 0%, transparent 70%);
  }
  
  .brand-icon svg {
    width: 36px;
    height: 36px;
    position: relative;
    z-index: 1;
  }
  
  .brand-text {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  
  .brand-main {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  
  .brand-name {
    font-size: 32px;
    font-weight: 900;
    letter-spacing: 6px;
    color: var(--text-primary);
  }
  
  .brand-sep {
    width: 2px;
    height: 24px;
    background: rgba(0,212,255,0.15);
    border-radius: 1px;
    position: relative;
    overflow: visible;
  }
  
  .brand-sep::after {
    content: '';
    position: absolute;
    left: -1.5px;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px rgba(0,212,255,0.8), 0 0 20px rgba(0,212,255,0.3);
    animation: sep-slide 3s ease-in-out infinite;
  }
  
  @keyframes sep-slide {
    0%, 100% { top: 0; opacity: 0; }
    15% { opacity: 1; }
    50% { top: calc(100% - 5px); opacity: 1; }
    85% { opacity: 1; }
    100% { top: 0; opacity: 0; }
  }
  
  .brand-sub {
    font-size: 32px;
    font-weight: 300;
    letter-spacing: 6px;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,212,255,0.35);
  }
  
  .brand-en {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 3px;
    color: var(--accent);
    opacity: 0.4;
    text-transform: uppercase;
    font-family: 'SF Mono','Fira Code','Consolas',monospace;
  }
  
  .header-desc {
    font-size: 14px;
    color: var(--text-muted);
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  .header-desc .dot {
    color: rgba(0,212,255,0.28);
  }
  
  /* Latest Report Section */
  .section {
    padding: 40px 0;
  }
  
  .section-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border) 0%, transparent 100%);
  }
  
  .latest-card {
    background: linear-gradient(135deg, rgba(0,212,255,0.08) 0%, rgba(0,212,255,0.02) 100%);
    border: 1px solid var(--accent-border);
    border-radius: 16px;
    padding: 28px 32px;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
    cursor: pointer;
  }
  
  .latest-card::before {
    content: '';
    position: absolute;
    top: 0;
    right: 0;
    width: 150px;
    height: 150px;
    background: radial-gradient(circle at 100% 0%, rgba(0,212,255,0.15) 0%, transparent 70%);
    pointer-events: none;
  }
  
  .latest-card:hover {
    border-color: var(--accent);
    box-shadow: 0 0 30px rgba(0,212,255,0.15), 0 8px 32px rgba(0,0,0,0.3);
    transform: translateY(-2px);
  }
  
  .latest-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(135deg, var(--accent) 0%, #0099cc 100%);
    color: #000;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 16px;
    letter-spacing: 1px;
  }
  
  .live-dot {
    width: 6px;
    height: 6px;
    background: #000;
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.8); }
  }
  
  .latest-date {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
    font-family: 'SF Mono','Fira Code','Consolas',monospace;
    margin-bottom: 12px;
    text-shadow: 0 0 20px rgba(0,212,255,0.4);
  }
  
  .latest-title {
    font-size: 16px;
    color: var(--text-secondary);
    line-height: 1.8;
    margin-bottom: 20px;
  }
  
  .latest-title span {
    color: var(--yellow);
    font-weight: 600;
  }
  
  .latest-arrow {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--accent);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
  }
  
  .latest-arrow svg {
    transition: transform 0.3s ease;
  }
  
  .latest-card:hover .latest-arrow svg {
    transform: translateX(4px);
  }
  
  /* History List */
  .history-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  
  .history-item {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    transition: all 0.25s ease;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  
  .history-item::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.25s ease;
  }
  
  .history-item:hover {
    background: var(--bg-hover);
    border-color: rgba(0,212,255,0.3);
    transform: translateX(4px);
  }
  
  .history-item:hover::before {
    opacity: 1;
  }
  
  .history-date {
    min-width: 100px;
    text-align: center;
  }
  
  .history-date-main {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
    font-family: 'SF Mono','Fira Code','Consolas',monospace;
  }
  
  .history-date-sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  
  .history-divider {
    width: 1px;
    height: 40px;
    background: var(--border);
    flex-shrink: 0;
  }
  
  .history-content {
    flex: 1;
    min-width: 0;
  }
  
  .history-title {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  
  .history-title .highlight {
    color: var(--yellow);
  }
  
  .history-arrow {
    color: var(--text-muted);
    flex-shrink: 0;
    transition: all 0.25s ease;
  }
  
  .history-item:hover .history-arrow {
    color: var(--accent);
    transform: translateX(2px);
  }
  
  /* Footer */
  .footer {
    padding: 40px 0;
    text-align: center;
    border-top: 1px solid var(--border);
    margin-top: 40px;
  }
  
  .footer-text {
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  
  .footer-text .heart {
    color: var(--red);
    animation: heartbeat 1.5s ease-in-out infinite;
  }
  
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }
  
  /* Responsive */
  @media (max-width: 768px) {
    .container {
      padding: 0 20px;
    }
    
    .header {
      padding: 30px 0 24px;
    }
    
    .brand-name, .brand-sub {
      font-size: 24px;
      letter-spacing: 4px;
    }
    
    .brand-icon {
      width: 56px;
      height: 56px;
    }
    
    .brand-icon svg {
      width: 28px;
      height: 28px;
    }
    
    .latest-card {
      padding: 20px;
    }
    
    .latest-date {
      font-size: 22px;
    }
    
    .history-item {
      padding: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }
    
    .history-divider {
      display: none;
    }
    
    .history-date {
      min-width: auto;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .history-arrow {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
    }
  }
  
  /* Animations */
  .fade-in {
    animation: fadeIn 0.6s ease forwards;
    opacity: 0;
  }
  
  @keyframes fadeIn {
    to { opacity: 1; }
  }
  
  .slide-up {
    animation: slideUp 0.6s ease forwards;
    opacity: 0;
    transform: translateY(20px);
  }
  
  @keyframes slideUp {
    to { opacity: 1; transform: translateY(0); }
  }
  
  .stagger-1 { animation-delay: 0.1s; }
  .stagger-2 { animation-delay: 0.2s; }
  .stagger-3 { animation-delay: 0.3s; }
  .stagger-4 { animation-delay: 0.4s; }
  .stagger-5 { animation-delay: 0.5s; }
  .stagger-6 { animation-delay: 0.6s; }
  .stagger-7 { animation-delay: 0.7s; }
  .stagger-8 { animation-delay: 0.8s; }
  .stagger-9 { animation-delay: 0.9s; }
  .stagger-10 { animation-delay: 1.0s; }
</style>
</head>
<body>

<header class="header">
  <div class="container">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M18 3L21 9H27L22.5 13.5L24 21L18 17L12 21L13.5 13.5L9 9H15L18 3Z" fill="url(#grad)" stroke="#00d4ff" stroke-width="1"/>
          <defs>
            <linearGradient id="grad" x1="9" y1="3" x2="27" y2="21">
              <stop offset="0%" stop-color="#00d4ff"/>
              <stop offset="100%" stop-color="#0099cc"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="brand-text">
        <div class="brand-main">
          <span class="brand-name">老盛早知道</span>
          <div class="brand-sep"></div>
          <span class="brand-sub">LAOSHENG</span>
        </div>
        <div class="brand-en">Daily Market Intelligence</div>
      </div>
    </div>
    <div class="header-desc">
      <span>每日早间市场情报</span>
      <span class="dot">·</span>
      <span>数据截至前一交易日收盘</span>
    </div>
  </div>
</header>

<main class="container">
  <!-- Latest Report -->
  <section class="section">
    <div class="section-title slide-up">最新报告</div>
    <a href="老盛早知道_20260527.html" class="latest-card slide-up stagger-1" id="latest-card">
      <div class="latest-badge">
        <span class="live-dot"></span>
        <span>LIVE</span>
      </div>
      <div class="latest-date" id="latest-date">2026 / 05 / 27</div>
      <div class="latest-title" id="latest-title">
        <span>央行MLF 6000亿</span> · <span>纳指标普齐创新高</span> · <span>建行历史新高</span> · <span>港股科技大涨</span>
      </div>
      <div class="latest-arrow">
        <span>查看完整报告</span>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 8H13M13 8L9 4M13 8L9 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </a>
  </section>

  <!-- History -->
  <section class="section">
    <div class="section-title slide-up stagger-2">历史报告</div>
    <div class="history-list" id="history-list">
      <!-- Populated by JS -->
    </div>
  </section>
</main>

<footer class="footer">
  <div class="container">
    <div class="footer-text">
      <span>Made with</span>
      <span class="heart">❤</span>
      <span>by 老盛</span>
    </div>
  </div>
</footer>

<script>
// 所有快报数据（按日期倒序）- 只保留最近10天
const reports = [
  { date: "20260527", weekday: "星期三", title: "央行MLF 6000亿·纳指标普齐创新高·建行历史新高·港股科技大涨" },
  { date: "20260526", weekday: "星期二", title: "科创50暴涨5.88%·央行放水·原油暴跌" },
  { date: "20260525", weekday: "星期一", title: "央行6000亿MLF净投放1000亿·科创50大涨5.88%半导体爆发·道指首破50500创历史新高·黄金价格突破4570美元" },
  { date: "20260524", weekday: "星期日", title: "周末休市·A股5/22强势反弹创业板大涨2.84%·道指50286创历史新高·港股AI爆发" },
  { date: "20260523", weekday: "星期六", title: "A股全线反弹创业板大涨2.84%·道指50580创收盘新高·日经225暴涨2.68%创新高" },
  { date: "20260522", weekday: "星期五", title: "A股全线反弹创业板大涨2.84%领涨·道指50579创历史新高·日经225暴涨2.68%" },
  { date: "20260521", weekday: "星期四", title: "科创50大涨3.2%创历史新高·半导体AI算力爆发·银行股放量杀跌" },
  { date: "20260520", weekday: "星期三", title: "A股 V型反转上证涨0.92%科创50大涨3.81%·美股涨跌不一" },
  { date: "20260519", weekday: "星期二", title: "A股缩量震荡科创50逆势涨0.8%·美股分化道指涨0.32%" },
  { date: "20260518", weekday: "星期一", title: "全球国债闪崩30年美债破5.1%·A股两连跌退守4135·韩股暴跌6.12%" },
];

const latest = reports[0];
const history = reports.slice(1);

// Format date for display
function formatDate(dateStr) {
  const year = dateStr.slice(0, 4);
  const month = dateStr.slice(4, 6);
  const day = dateStr.slice(6, 8);
  return `${year}.${month}.${day}`;
}

// Highlight key terms in title
function highlightTitle(title) {
  const keywords = ['创新高', '暴涨', '大跌', '突破', '暴跌', 'MLF', '历史新高'];
  let result = title;
  keywords.forEach(kw => {
    const regex = new RegExp(kw, 'g');
    result = result.replace(regex, `<span class="highlight">${kw}</span>`);
  });
  return result;
}

// Generate history items
const historyList = document.getElementById('history-list');
history.forEach((item, index) => {
  const div = document.createElement('a');
  div.className = `history-item slide-up stagger-${Math.min(index + 3, 10)}`;
  div.href = `老盛早知道_${item.date}.html`;
  div.innerHTML = `
    <div class="history-date">
      <div class="history-date-main">${formatDate(item.date)}</div>
      <div class="history-date-sub">${item.weekday}</div>
    </div>
    <div class="history-divider"></div>
    <div class="history-content">
      <div class="history-title">${highlightTitle(item.title)}</div>
    </div>
    <div class="history-arrow">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M6 4L10 8L6 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  `;
  historyList.appendChild(div);
});

// Latest card click handler
document.getElementById('latest-card').addEventListener('click', function(e) {
  window.location.href = `老盛早知道_${latest.date}.html`;
});
</script>

</body>
</html>
