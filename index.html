<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>老盛早知道 - 每日快讯</title>
<style>
/* ══════════ CSS VARIABLES ══════════ */
:root {
  --bg-primary:#0d1117;
  --bg-secondary:#161b22;
  --bg-card:#1c2333;
  --bg-hover:#21273a;
  --accent:#00d4ff;
  --accent-dim:rgba(0,212,255,0.15);
  --accent-border:rgba(0,212,255,0.35);
  --green:#3fb950;
  --red:#f85149;
  --yellow:#d29922;
  --purple:#bc8cff;
  --orange:#ffa657;
  --text-primary:#e6edf3;
  --text-secondary:#8b949e;
  --text-muted:#6e7681;
  --border:rgba(48,54,61,0.8);
  --radius:12px;
  --radius-sm:8px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,'SF Pro Text','PingFang SC','Noto Sans SC',sans-serif;
  background:var(--bg-primary);
  color:var(--text-primary);
  line-height:1.7;
  min-height:100vh;
  background-image:
    radial-gradient(ellipse 80% 40% at 50% -5%, rgba(0,80,160,0.14) 0%, transparent 60%),
    repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,212,255,0.008) 3px, rgba(0,212,255,0.008) 4px);
  -webkit-font-smoothing:antialiased;
}

/* ══════════ PASSWORD GATE ══════════ */
.pw-overlay {
  position:fixed;inset:0;z-index:9999;
  background:var(--bg-primary);
  display:flex;align-items:center;justify-content:center;
  transition:opacity 0.6s ease, visibility 0.6s ease;
  overflow:hidden;
}
.pw-overlay.hidden { opacity:0;pointer-events:none;visibility:hidden; }

.pw-overlay::before {
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(circle 300px at 20% 30%, rgba(0,212,255,0.06) 0%, transparent 70%),
    radial-gradient(circle 250px at 80% 70%, rgba(188,140,255,0.05) 0%, transparent 70%),
    radial-gradient(circle 200px at 50% 50%, rgba(0,212,255,0.03) 0%, transparent 70%);
  animation:pw-bg-drift 12s ease-in-out infinite alternate;
}
@keyframes pw-bg-drift {
  0% { transform:scale(1) translate(0,0); }
  50% { transform:scale(1.1) translate(-2%,3%); }
  100% { transform:scale(1) translate(2%,-2%); }
}

.pw-particles {
  position:absolute;inset:0;overflow:hidden;pointer-events:none;
}
.pw-particle {
  position:absolute;width:3px;height:3px;border-radius:50%;
  background:var(--accent);opacity:0;
  animation:pw-float linear infinite;
}
.pw-particle:nth-child(1) { left:10%;top:80%;animation-duration:14s;animation-delay:0s;width:2px;height:2px; }
.pw-particle:nth-child(2) { left:25%;top:90%;animation-duration:18s;animation-delay:2s;background:var(--purple); }
.pw-particle:nth-child(3) { left:45%;top:85%;animation-duration:12s;animation-delay:4s;width:4px;height:4px; }
.pw-particle:nth-child(4) { left:65%;top:95%;animation-duration:16s;animation-delay:1s;background:var(--purple); }
.pw-particle:nth-child(5) { left:80%;top:88%;animation-duration:20s;animation-delay:3s;width:2px;height:2px; }
.pw-particle:nth-child(6) { left:35%;top:92%;animation-duration:15s;animation-delay:5s; }
.pw-particle:nth-child(7) { left:55%;top:82%;animation-duration:17s;animation-delay:6s;background:var(--green);width:2px;height:2px; }
.pw-particle:nth-child(8) { left:90%;top:75%;animation-duration:13s;animation-delay:7s;background:var(--green); }
@keyframes pw-float {
  0% { transform:translateY(0) translateX(0);opacity:0; }
  10% { opacity:0.6; }
  90% { opacity:0.3; }
  100% { transform:translateY(-100vh) translateX(30px);opacity:0; }
}

.pw-overlay::after {
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,212,255,0.015) 2px, rgba(0,212,255,0.015) 4px
  );
  pointer-events:none;
}

.pw-box {
  text-align:center;max-width:380px;width:90%;padding:44px 36px;
  background:rgba(22,27,34,0.85);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(0,212,255,0.2);
  border-radius:20px;
  box-shadow:0 0 80px rgba(0,212,255,0.06),0 0 0 1px rgba(0,212,255,0.05),inset 0 1px 0 rgba(255,255,255,0.04);
  position:relative;z-index:1;
  animation:pw-box-in 0.8s ease forwards;
}
@keyframes pw-box-in {
  from { opacity:0;transform:translateY(30px) scale(0.96); }
  to { opacity:1;transform:translateY(0) scale(1); }
}

.pw-box::before {
  content:'';position:absolute;top:-1px;left:20%;right:20%;height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),var(--purple),transparent);
  border-radius:2px;
}

.pw-box .pw-icon {
  width:60px;height:60px;margin:0 auto 22px;
  background:linear-gradient(145deg,rgba(0,212,255,0.08),rgba(0,212,255,0.02));
  border:1px solid rgba(0,212,255,0.25);border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 30px rgba(0,212,255,0.15);
  position:relative;
}
.pw-box .pw-icon::after {
  content:'';position:absolute;inset:-6px;border-radius:20px;
  border:1px solid rgba(0,212,255,0.06);
  animation:pw-icon-ring 3s ease-in-out infinite;
}
@keyframes pw-icon-ring {
  0%,100% { transform:scale(1);opacity:0.5; }
  50% { transform:scale(1.08);opacity:1; }
}
.pw-box .pw-icon svg { width:28px;height:28px; }

.pw-box h2 { font-size:20px;font-weight:700;color:var(--text-primary);margin-bottom:6px;letter-spacing:2px; }
.pw-box p { font-size:13px;color:var(--text-muted);margin-bottom:28px; }
.pw-box input[type="password"] {
  width:100%;padding:14px 18px;font-size:16px;
  background:rgba(13,17,23,0.8);
  border:1px solid rgba(48,54,61,0.8);
  border-radius:10px;color:var(--text-primary);
  outline:none;letter-spacing:6px;text-align:center;
  transition:all 0.3s ease;
}
.pw-box input[type="password"]:focus {
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(0,212,255,0.1),0 0 20px rgba(0,212,255,0.08);
}
.pw-box input[type="password"]::placeholder { letter-spacing:1px;color:var(--text-muted);font-size:14px; }

.pw-box .pw-btn {
  margin-top:18px;width:100%;padding:13px;font-size:14px;font-weight:600;
  background:linear-gradient(135deg,#00d4ff,#0099cc);
  color:#0d1117;border:none;border-radius:10px;cursor:pointer;
  letter-spacing:3px;transition:all 0.3s ease;
  position:relative;overflow:hidden;
}
.pw-box .pw-btn::before {
  content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);
  transition:left 0.5s ease;
}
.pw-box .pw-btn:hover::before { left:100%; }
.pw-box .pw-btn:hover {
  box-shadow:0 0 30px rgba(0,212,255,0.35);transform:translateY(-2px);
}
.pw-box .pw-btn:active { transform:translateY(0); }

.pw-box .pw-error {
  color:var(--red);font-size:12px;margin-top:14px;min-height:18px;
  transition:opacity 0.3s;
}

/* ══════════ MAIN CONTENT (解锁后) ══════════ */
.main-wrapper {
  display:none;
  animation:fadeIn 0.8s ease;
}
.main-wrapper.visible { display:block; }
@keyframes fadeIn {
  from { opacity:0;transform:translateY(20px); }
  to { opacity:1;transform:translateY(0); }
}

/* Hero Section */
.hero-section {
  max-width:1200px;margin:0 auto;padding:40px 24px;
  animation:heroIn 1s ease forwards;
}
@keyframes heroIn {
  from { opacity:0;transform:translateY(40px); }
  to { opacity:1;transform:translateY(0); }
}

.hero-badge-row {
  display:flex;align-items:center;gap:12px;margin-bottom:16px;
}
.hero-badge {
  display:inline-flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,rgba(0,212,255,0.15),rgba(0,212,255,0.05));
  border:1px solid rgba(0,212,255,0.3);
  padding:4px 12px;border-radius:20px;
  font-size:11px;font-weight:600;letter-spacing:1px;color:var(--accent);
}
.hero-badge-dot {
  width:6px;height:6px;border-radius:50%;
  background:var(--accent);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.7)}
}

.hero-label {
  font-size:13px;color:var(--text-muted);
  font-family:'SF Mono','Fira Code',monospace;
}

.hero-card {
  display:block;
  background:linear-gradient(135deg,rgba(22,27,34,0.95),rgba(28,35,51,0.9));
  border:1px solid rgba(0,212,255,0.2);
  border-radius:20px;
  padding:36px 40px;
  text-decoration:none;color:inherit;
  position:relative;
  overflow:hidden;
  transition:all 0.4s ease;
  box-shadow:0 0 60px rgba(0,212,255,0.05),0 20px 60px rgba(0,0,0,0.4);
}
.hero-card::before {
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--accent),var(--purple),var(--accent));
  background-size:200% 100%;
  animation:gradientMove 3s linear infinite;
}
@keyframes gradientMove {
  0% { background-position:0% 50%; }
  100% { background-position:200% 50%; }
}
.hero-card::after {
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 40% at 100% 0%, rgba(0,212,255,0.08) 0%, transparent 60%);
  pointer-events:none;
}
.hero-card:hover {
  border-color:rgba(0,212,255,0.4);
  transform:translateY(-4px);
  box-shadow:0 0 80px rgba(0,212,255,0.1),0 30px 80px rgba(0,0,0,0.5);
}

.hero-grid {
  display:grid;grid-template-columns:120px 1fr;gap:40px;align-items:center;
}

.hero-date-block {
  text-align:center;
  background:linear-gradient(145deg,rgba(0,212,255,0.1),rgba(0,212,255,0.02));
  border:1px solid rgba(0,212,255,0.2);
  border-radius:16px;
  padding:20px 16px;
  position:relative;
}
.hero-date-block::before {
  content:'';position:absolute;top:-1px;left:15%;right:15%;height:2px;
  background:var(--accent);
  border-radius:2px;
  box-shadow:0 0 10px var(--accent);
}
.hero-date-day {
  font-size:48px;font-weight:800;line-height:1;
  color:var(--accent);
  text-shadow:0 0 30px rgba(0,212,255,0.5);
  font-family:'SF Mono','Fira Code',monospace;
}
.hero-date-month {
  font-size:14px;color:var(--text-secondary);margin-top:4px;
}
.hero-date-weekday {
  font-size:12px;color:var(--text-muted);margin-top:2px;
}

.hero-content { position:relative;z-index:1; }

.hero-title {
  font-size:22px;font-weight:700;line-height:1.5;
  color:var(--text-primary);margin-bottom:20px;
  letter-spacing:0.5px;
}

.hero-tags {
  display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px;
}
.hero-tag {
  background:rgba(188,140,255,0.1);
  border:1px solid rgba(188,140,255,0.2);
  padding:4px 12px;border-radius:16px;
  font-size:12px;color:var(--purple);
  transition:all 0.3s ease;
}
.hero-card:hover .hero-tag {
  background:rgba(188,140,255,0.15);
  border-color:rgba(188,140,255,0.3);
}

.hero-read-btn {
  display:inline-flex;align-items:center;gap:8px;
  color:var(--accent);font-size:14px;font-weight:600;
  transition:all 0.3s ease;
}
.hero-read-btn .arrow {
  transition:transform 0.3s ease;
}
.hero-card:hover .hero-read-btn .arrow {
  transform:translateX(6px);
}

/* Archive Section */
.archive-section {
  max-width:1200px;margin:0 auto;padding:0 24px 60px;
  animation:archiveIn 1s ease 0.3s forwards;
  opacity:0;
}
@keyframes archiveIn {
  from { opacity:0;transform:translateY(30px); }
  to { opacity:1;transform:translateY(0); }
}

.section-header {
  display:flex;align-items:center;gap:16px;margin-bottom:24px;
  padding-bottom:16px;
  border-bottom:1px solid rgba(0,212,255,0.1);
}
.section-title {
  font-size:18px;font-weight:700;color:var(--text-primary);
  letter-spacing:1px;
}
.section-line {
  flex:1;height:1px;
  background:linear-gradient(90deg,rgba(0,212,255,0.2),transparent);
}

.archive-count {
  background:rgba(0,212,255,0.1);
  border:1px solid rgba(0,212,255,0.2);
  padding:4px 12px;border-radius:20px;
  font-size:12px;color:var(--accent);
}

/* Timeline */
.archive-timeline {
  display:flex;flex-direction:column;gap:0;
  position:relative;
}
.archive-timeline::before {
  content:'';position:absolute;left:20px;top:0;bottom:0;width:2px;
  background:linear-gradient(180deg,var(--accent),rgba(0,212,255,0.1));
  border-radius:1px;
}

.timeline-item {
  display:grid;grid-template-columns:40px 1fr;gap:20px;
  padding:20px 0;padding-left:16px;
  text-decoration:none;color:inherit;
  position:relative;
  transition:all 0.3s ease;
}
.timeline-item::before {
  content:'';position:absolute;left:14px;top:28px;
  width:14px;height:14px;border-radius:50%;
  background:var(--bg-card);
  border:2px solid var(--accent);
  transition:all 0.3s ease;
  z-index:1;
}
.timeline-item:hover::before {
  background:var(--accent);
  box-shadow:0 0 20px rgba(0,212,255,0.5);
  transform:scale(1.2);
}
.timeline-item:hover {
  transform:translateX(8px);
}

.tl-date-block {
  text-align:center;
  background:linear-gradient(145deg,rgba(0,212,255,0.08),rgba(0,212,255,0.02));
  border:1px solid rgba(0,212,255,0.15);
  border-radius:12px;
  padding:12px 8px;
  transition:all 0.3s ease;
}
.timeline-item:hover .tl-date-block {
  border-color:rgba(0,212,255,0.3);
  background:linear-gradient(145deg,rgba(0,212,255,0.12),rgba(0,212,255,0.04));
}

.tl-day {
  font-size:24px;font-weight:700;line-height:1;
  color:var(--text-primary);
  font-family:'SF Mono','Fira Code',monospace;
}
.tl-month {
  font-size:11px;color:var(--text-muted);margin-top:2px;
}

.tl-content {
  background:rgba(22,27,34,0.6);
  border:1px solid rgba(48,54,61,0.6);
  border-radius:12px;
  padding:16px 20px;
  transition:all 0.3s ease;
}
.timeline-item:hover .tl-content {
  background:rgba(28,35,51,0.8);
  border-color:rgba(0,212,255,0.2);
}

.tl-header {
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:8px;
}
.tl-date {
  font-size:13px;font-weight:600;color:var(--accent);
  font-family:'SF Mono','Fira Code',monospace;
}
.tl-weekday {
  font-size:11px;color:var(--text-muted);
  background:rgba(0,212,255,0.05);
  padding:2px 8px;border-radius:10px;
}

.tl-title {
  font-size:14px;color:var(--text-secondary);line-height:1.6;
  margin-bottom:10px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;
}

.tl-tags {
  display:flex;flex-wrap:wrap;gap:6px;
}
.tl-tag {
  font-size:11px;color:var(--purple);
  background:rgba(188,140,255,0.08);
  padding:2px 8px;border-radius:10px;
  transition:all 0.3s ease;
}
.timeline-item:hover .tl-tag {
  background:rgba(188,140,255,0.12);
}

.tl-arrow {
  font-size:12px;color:var(--accent);margin-top:10px;
  opacity:0;transform:translateX(-10px);
  transition:all 0.3s ease;
  display:flex;align-items:center;gap:4px;
}
.timeline-item:hover .tl-arrow {
  opacity:1;transform:translateX(0);
}

/* Footer */
.site-footer {
  max-width:1200px;margin:0 auto;padding:40px 24px 60px;
  text-align:center;
  border-top:1px solid rgba(0,212,255,0.08);
}
.footer-brand {
  font-size:14px;font-weight:600;color:var(--text-secondary);margin-bottom:8px;
  letter-spacing:2px;
}
.footer-note {
  font-size:12px;color:var(--text-muted);
}

/* Responsive */
@media (max-width:768px) {
  .hero-grid {
    grid-template-columns:1fr;gap:24px;
    text-align:center;
  }
  .hero-date-block { display:inline-flex;gap:12px;align-items:center; }
  .hero-date-day { font-size:32px; }
  .hero-title { font-size:18px; }
  .hero-card { padding:24px; }
  .archive-timeline::before { left:14px; }
  .timeline-item { grid-template-columns:32px 1fr;gap:12px; }
  .tl-date-block { padding:8px 6px; }
  .tl-day { font-size:18px; }
}
</style>
</head>
<body>

<!-- ══════════ PASSWORD OVERLAY ══════════ -->
<div class="pw-overlay" id="pw-overlay">
  <div class="pw-particles">
    <div class="pw-particle"></div>
    <div class="pw-particle"></div>

// ══════════ REPORTS DATA ══════════
const reports = [

function getLink(dateStr) {
  return `老盛早知道_${dateStr}.html`;
}

function extractKeywords(title, count = 3) {
  return title.split('·').map(s => s.trim()).filter(Boolean).slice(0, count);
}

// ══════════ RENDER CONTENT ══════════
function renderContent() {
  const latest = reports[0];
  const archive = reports.slice(1);

  // Hero Section
  document.getElementById('hero-date-label').textContent = `${latest.date.slice(0,4)}年${parseInt(latest.date.slice(4,6))}月${parseInt(latest.date.slice(6,8))}日`;
  document.getElementById('hero-day').textContent = parseInt(latest.date.slice(6,8));
  document.getElementById('hero-month').textContent = parseInt(latest.date.slice(4,6)) + '月';
  document.getElementById('hero-weekday').textContent = latest.weekday;
  document.getElementById('hero-title').textContent = latest.title;
  document.getElementById('hero-card').href = getLink(latest.date);
  
  const tags = extractKeywords(latest.title, 3);
  document.getElementById('hero-tags').innerHTML = tags.map(t => `<span class="hero-tag">${t}</span>`).join('');

  // Archive Section
  document.getElementById('archive-count').textContent = `${archive.length}期`;
  
  const timeline = document.getElementById('archive-timeline');
  timeline.innerHTML = archive.map(r => {
    const tags = extractKeywords(r.title, 2);
    const d = r.date;
    return `
      <a class="timeline-item" href="${getLink(d)}">
        <div class="tl-date-block">
          <div class="tl-day">${parseInt(d.slice(6,8))}</div>
          <div class="tl-month">${parseInt(d.slice(4,6))}月</div>
        </div>
        <div class="tl-content">
          <div class="tl-header">
            <span class="tl-date">${d.slice(0,4)}.${d.slice(4,6)}.${d.slice(6,8)}</span>
            <span class="tl-weekday">${r.weekday}</span>
          </div>
          <div class="tl-title">${r.title}</div>
          <div class="tl-tags">
            ${tags.map(t => `<span class="tl-tag">${t}</span>`).join('')}
          </div>
          <div class="tl-arrow">查看详情 &rarr;</div>
        </div>
      </a>
    `;
  }).join('');

  // Show main content
  document.getElementById('main-wrapper').classList.add('visible');
}

// ══════════ PASSWORD VERIFICATION ══════════
(function() {
  const _0x1a = [78,85,74,123,79,69,86,51,79,123,104,62];
  const _0x1b = _0x1a.map(function(c){return String.fromCharCode(c - 1)}).join('');
  const KEY = 'lszd_auth';

  // Check session auth
  if (sessionStorage.getItem(KEY) === 'ok') {
    document.getElementById('pw-overlay').classList.add('hidden');
    renderContent();
    return;
  }

  function verify(pwd) {
    return btoa(pwd) === _0x1b;
  }

  window.checkPassword = function() {
    var input = document.getElementById('pw-input');
    var error = document.getElementById('pw-error');
    var val = input.value.trim();
    if (!val) { error.textContent = '请输入密码'; return; }
    if (verify(val)) {
      sessionStorage.setItem(KEY, 'ok');
      document.getElementById('pw-overlay').classList.add('hidden');
      renderContent();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      error.textContent = '密码错误，请重试';
      input.value = '';
      input.focus();
    }
  };

  document.getElementById('pw-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); window.checkPassword(); }
  });

  document.getElementById('pw-input').focus();
})();
</script>
