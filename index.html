/* ══════════ PASSWORD GATE ══════════ */
.pw-overlay {
  position:fixed;inset:0;z-index:9999;
  background:var(--bg-primary);
  display:flex;align-items:center;justify-content:center;
  transition:opacity 0.5s ease;
}
.pw-overlay.hidden { opacity:0;pointer-events:none; }
.pw-box {
  text-align:center;max-width:360px;padding:40px;
  background:var(--bg-secondary);border:1px solid var(--accent-border);
  border-radius:14px;box-shadow:0 0 60px rgba(0,212,255,0.08);
}
.pw-box .pw-icon {
  width:56px;height:56px;margin:0 auto 20px;
  background:linear-gradient(145deg,#0a1e35,#0d2040);
  border:1px solid rgba(0,212,255,0.38);border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 20px rgba(0,212,255,0.25);
}
.pw-box .pw-icon svg { width:28px;height:28px; }
.pw-box h2 {
  font-size:20px;font-weight:700;color:var(--text-primary);margin-bottom:6px;letter-spacing:2px;
}
.pw-box p {
  font-size:13px;color:var(--text-muted);margin-bottom:24px;
}
.pw-box input[type="password"] {
  width:100%;padding:12px 16px;font-size:16px;
  background:var(--bg-primary);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text-primary);
  outline:none;letter-spacing:4px;text-align:center;
  transition:border-color 0.3s;
}
.pw-box input[type="password"]:focus { border-color:var(--accent); }
.pw-box input[type="password"]::placeholder { letter-spacing:1px;color:var(--text-muted); }
.pw-box .pw-btn {
  margin-top:16px;width:100%;padding:12px;font-size:14px;font-weight:600;
  background:linear-gradient(135deg,#00d4ff,#0099cc);color:#0d1117;
  border:none;border-radius:var(--radius-sm);cursor:pointer;
  letter-spacing:2px;transition:all 0.3s;
}
.pw-box .pw-btn:hover { box-shadow:0 0 20px rgba(0,212,255,0.4);transform:translateY(-1px); }
.pw-box .pw-error {
  color:var(--red);font-size:12px;margin-top:12px;min-height:18px;
  transition:opacity 0.3s;
}

:root {
  --bg-primary:#0d1117;--bg-secondary:#161b22;--bg-card:#1c2333;--bg-hover:#21273a;
  --accent:#00d4ff;--accent-dim:rgba(0,212,255,0.15);--accent-border:rgba(0,212,255,0.35);
  --green:#3fb950;--red:#f85149;--yellow:#d29922;--purple:#bc8cff;--orange:#ffa657;
  --text-primary:#e6edf3;--text-secondary:#8b949e;--text-muted:#6e7681;
  --border:rgba(48,54,61,0.8);--radius:10px;--radius-sm:8px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,'SF Pro Text','PingFang SC','Noto Sans SC',sans-serif;
  background:var(--bg-primary);color:var(--text-primary);line-height:1.7;
  min-height:100vh;
  background-image:
    radial-gradient(ellipse 80% 40% at 50% -5%, rgba(0,80,160,0.14) 0%, transparent 60%),
    repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,212,255,0.008) 3px, rgba(0,212,255,0.008) 4px);
}

/* ══════════ HEADER ══════════ */
.header {
  background: linear-gradient(180deg, #080e18 0%, #0a1422 100%);
  border-bottom: 1px solid rgba(0,212,255,0.18);
  position: relative;
  z-index: 100;
  box-shadow: 0 2px 40px rgba(0,0,0,0.7), 0 1px 0 rgba(0,212,255,0.12);
}
.header::before {
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent 0%,var(--accent) 25%,var(--purple) 75%,transparent 100%);
  box-shadow:0 0 18px var(--accent);
}
.header-inner { max-width:1200px;margin:0 auto;padding:22px 40px 0; }
.header-top {
  display:grid;grid-template-columns:72px 1fr auto;
  align-items:center;gap:22px;padding-bottom:24px;
}

/* ══ BRAND ICON ══ */
.brand-icon {
  width:72px;height:72px;
  background:linear-gradient(145deg,#0a1e35 0%,#0d2040 60%,#091828 100%);
  border:1px solid rgba(0,212,255,0.38);border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 28px rgba(0,212,255,0.32),0 0 8px rgba(0,212,255,0.12),inset 0 1px 0 rgba(255,255,255,0.08);
  flex-shrink:0;position:relative;overflow:hidden;align-self:center;
}
.brand-icon::before {
  content:'';position:absolute;top:-4px;left:-4px;width:32px;height:32px;
  background:radial-gradient(circle,rgba(0,212,255,0.22) 0%,transparent 70%);pointer-events:none;
}
.brand-icon::after {
  content:'';position:absolute;inset:0;border-radius:18px;
  background:linear-gradient(135deg,rgba(0,212,255,0.08) 0%,transparent 55%);pointer-events:none;
}
.brand-icon svg { width:36px;height:36px;position:relative;z-index:1; }

/* ══ BRAND TITLE ══ */
.brand-title { display:flex;flex-direction:column;justify-content:center;gap:6px;line-height:1; }
.brand-en-row { display:flex;align-items:center;gap:8px; }
.brand-en {
  font-size:9.5px;font-weight:600;letter-spacing:2.5px;
  color:var(--accent);opacity:0.4;text-transform:uppercase;
  font-family:'SF Mono','Fira Code','Consolas',monospace;
}
.brand-main-row { display:flex;align-items:center; }

/* ══ 信号脉冲标题 ══ */
.brand-signal {
  position:relative;display:inline-flex;align-items:center;cursor:default;padding:4px 0;overflow:visible;
}
.brand-signal::before {
  content:'';position:absolute;inset:-8px -16px;border-radius:10px;
  background:radial-gradient(ellipse at center,rgba(0,212,255,0.06) 0%,transparent 70%);
  animation:signal-pulse 5s ease-in-out infinite;pointer-events:none;
}
.brand-name {
  font-size:28px;font-weight:900;letter-spacing:5px;color:#e6edf3;position:relative;
}
.brand-sep {
  position:relative;width:2px;height:22px;background:rgba(0,212,255,0.15);
  margin:0 10px;border-radius:1px;align-self:center;overflow:visible !important;
}
.brand-sep::after {
  content:'';position:absolute;left:-1.5px;width:5px;height:5px;border-radius:50%;
  background:var(--accent);box-shadow:0 0 8px rgba(0,212,255,0.8),0 0 20px rgba(0,212,255,0.3);
  animation:sep-slide 3s ease-in-out infinite;
}
.brand-zaodao {
  font-size:28px;font-weight:300;letter-spacing:5px;color:var(--accent);
  text-shadow:0 0 20px rgba(0,212,255,0.35);position:relative;
}
@keyframes signal-pulse { 0%,100%{opacity:0.4;transform:scale(1)} 50%{opacity:1;transform:scale(1.02)} }
@keyframes sep-slide { 0%{top:0;opacity:0} 15%{opacity:1} 50%{top:17px;opacity:1} 85%{opacity:1} 100%{top:0;opacity:0} }

.brand-tag {
  font-size:11px;font-weight:400;letter-spacing:2px;color:var(--text-primary);
  margin-left:12px;opacity:0.35;white-space:nowrap;
}
.brand-subtitle {
  font-size:11.5px;color:var(--text-muted);letter-spacing:0.5px;
  display:flex;align-items:center;margin-top:3px;flex-wrap:wrap;
}
.brand-subtitle .dot { color:rgba(0,212,255,0.28);margin:0 7px; }

.live-dot {
  display:inline-block;width:7px;height:7px;
  background:var(--green);border-radius:50%;
  box-shadow:0 0 8px var(--green);
  animation:pulse 2s ease-in-out infinite;vertical-align:middle;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.7)} }

/* ══ HEADER META ══ */
.header-meta {
  display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0;
  padding-left:20px;border-left:1px solid rgba(0,212,255,0.1);
}
.hm-date {
  font-size:22px;font-weight:700;letter-spacing:2px;color:var(--accent);line-height:1;
  text-shadow:0 0 14px rgba(0,212,255,0.4);
  font-family:'SF Mono','Fira Code','Consolas',monospace;
}
.hm-sub { font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:6px; }
.hm-sub .sep { color:rgba(0,212,255,0.25); }

/* ══════════ CONTENT ══════════ */
.main-content { max-width:1200px;margin:0 auto;padding:40px 40px 0; }

.section-title {
  font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--accent);padding-left:12px;border-left:2px solid var(--accent);margin-bottom:20px;
}

/* Latest */
.latest-card {
  background:var(--bg-card);border:1px solid var(--accent-border);border-radius:var(--radius);
  padding:28px 32px;transition:all 0.3s ease;position:relative;overflow:hidden;margin-bottom:40px;
}
.latest-card::before {
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent),var(--purple));
}
.latest-card:hover { border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,212,255,0.12) }
.latest-badge {
  display:inline-block;background:var(--accent);color:#0d1117;font-size:11px;font-weight:700;
  padding:2px 10px;border-radius:20px;letter-spacing:1px;margin-bottom:10px;
}
.latest-title { font-size:20px;font-weight:700;margin-bottom:6px }
.latest-title a { color:var(--text-primary);text-decoration:none;transition:color 0.2s }
.latest-title a:hover { color:var(--accent) }
.latest-meta { font-size:13px;color:var(--text-muted) }

/* Archive */
.archive-section { margin-top:10px; }
.archive-grid {
  display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;
}
.archive-card {
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px 22px;transition:all 0.25s ease;text-decoration:none;display:block;
  position:relative;overflow:hidden;
}
.archive-card::before {
  content:'';position:absolute;top:0;left:0;width:3px;height:100%;
  background:var(--accent);opacity:0;transition:opacity 0.25s;
}
.archive-card:hover { border-color:var(--accent-border);transform:translateY(-1px); }
.archive-card:hover::before { opacity:1 }
.archive-card:hover .card-date { color:var(--accent) }
.card-header { display:flex;justify-content:space-between;align-items:center }
.card-date {
  font-size:14px;font-weight:700;color:var(--text-primary);transition:color 0.2s;
  font-family:'SF Mono',Menlo,monospace;
}
.card-weekday {
  font-size:12px;color:var(--text-muted);background:rgba(0,212,255,0.06);
  padding:2px 8px;border-radius:4px;
}
.card-title { margin-top:6px;font-size:13px;color:var(--text-secondary) }

/* Footer */
.site-footer {
  max-width:1200px;margin:60px auto 0;padding:30px 40px;
  border-top:1px solid var(--border);text-align:center;
  color:var(--text-muted);font-size:12px;letter-spacing:1px;
}
.site-footer a { color:var(--accent);text-decoration:none }

/* Animations */
@keyframes fadeInUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.fade-in { animation:fadeInUp 0.6s ease forwards }
.fade-in-delay-1 { animation-delay:0.1s;opacity:0 }
.fade-in-delay-2 { animation-delay:0.2s;opacity:0 }
.fade-in-delay-3 { animation-delay:0.3s;opacity:0 }

/* Mobile */
@media(max-width:768px){
  .header-inner,.main-content,.site-footer { padding-left:16px;padding-right:16px; }
  .header-inner { padding:16px 16px 0; }
  .header-top { grid-template-columns:auto 1fr;gap:10px;padding-bottom:16px; }
  .brand-icon { width:42px;height:42px;border-radius:10px;flex-shrink:0; }
  .brand-icon svg { width:22px;height:22px; }
  .brand-en { font-size:8.5px;letter-spacing:2px; }
  .brand-en-row { flex-wrap:wrap;gap:4px; }
  .brand-issue { font-size:8px; }
  .brand-name,.brand-zaodao { font-size:18px;letter-spacing:2px; }
  .brand-sep { margin:0 6px;height:16px; }
  .brand-tag { font-size:9px;margin-left:6px; }
  .brand-subtitle { font-size:10px;gap:2px; }
  .brand-subtitle .dot { margin:0 4px; }
  .header-meta { border-left:none;padding-left:0;flex-direction:row;flex-wrap:wrap;align-items:center;gap:6px;grid-column:1/-1;padding-top:0; }
  .hm-date { font-size:15px;letter-spacing:1px; }
  .hm-sub { font-size:10px; }
  .main-content { padding:20px 16px 0; }
  .archive-grid { grid-template-columns:1fr;gap:10px; }
  .archive-card { padding:14px 16px; }
  .latest-card { padding:16px 18px;margin-bottom:24px; }
  .latest-title { font-size:17px; }
  .latest-title a { line-height:1.4; }
  .section-title { font-size:12px;margin-bottom:14px; }
  .site-footer { padding:24px 16px; }
}
</style>
</head>

  const KEY = 'lszd_auth';

  // 检查 session 认证
  if (sessionStorage.getItem(KEY) === 'ok') {
    document.getElementById('pw-overlay').style.display = 'none';
    return;
  }

  function verify(pwd) {
    // 使用 base64 编码比对，不直接暴露明文
    return btoa(pwd) === _0x1b;
  }

  // 暴露全局函数
  window.checkPassword = function() {
    var input = document.getElementById('pw-input');
    var error = document.getElementById('pw-error');
    var val = input.value.trim();
    if (!val) { error.textContent = '请输入密码'; return; }
    if (verify(val)) {
      sessionStorage.setItem(KEY, 'ok');
      document.getElementById('pw-overlay').style.display = 'none';
      window.scrollTo(0, 0);
    } else {
      error.textContent = '密码错误，请重试';
      input.value = '';
      input.focus();
    }
  };

  // 回车提交
  document.getElementById('pw-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); window.checkPassword(); }
  });

  // 自动聚焦
  document.getElementById('pw-input').focus();
})();
</script>
</body>
</html>
