<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>老盛早知道 - 每日财经快讯</title>
<style>
/* ══════════ DESIGN SYSTEM ══════════ */
:root {
  --bg-deep: #0a0a0f;
  --bg-card: #12121a;
  --bg-card-hover: #1a1a25;
  --accent-gold: #d4a853;
  --accent-gold-dim: rgba(212, 168, 83, 0.15);
  --accent-gold-glow: rgba(212, 168, 83, 0.4);
  --accent-red: #e54d4d;
  --accent-green: #4dba7f;
  --text-primary: #f5f5f7;
  --text-secondary: #a1a1a6;
  --text-muted: #6e6e73;
  --border-subtle: rgba(255, 255, 255, 0.08);
  --border-gold: rgba(212, 168, 83, 0.3);
  --radius-lg: 24px;
  --radius-md: 16px;
  --radius-sm: 10px;
}

/* ══════════ BASE ══════════ */
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'SF Pro Display', -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* 背景纹理 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(ellipse 120% 60% at 50% -20%, rgba(212, 168, 83, 0.08) 0%, transparent 60%),
    radial-gradient(circle at 100% 100%, rgba(212, 168, 83, 0.04) 0%, transparent 50%),
    repeating-linear-gradient(
      0deg, 
      transparent, 
      transparent 80px, 
      rgba(212, 168, 83, 0.015) 80px, 
      rgba(212, 168, 83, 0.015) 81px
    );
  pointer-events: none;
  z-index: 0;
}

/* ══════════ PASSWORD OVERLAY ══════════ */
.pw-overlay {
  position: fixed;
  inset: 0;
  z-index: 10000;
  background: var(--bg-deep);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s;
  overflow: hidden;
}
.pw-overlay.hidden { opacity: 0; pointer-events: none; visibility: hidden; }

/* 背景动效 */
.pw-overlay .bg-animation {
  position: absolute;
  inset: 0;
  overflow: hidden;
}
.pw-overlay .bg-animation::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: conic-gradient(
    from 0deg at 50% 50%,
    transparent 0deg,
    rgba(212, 168, 83, 0.03) 60deg,
    transparent 120deg,
    rgba(212, 168, 83, 0.02) 180deg,
    transparent 240deg,
    rgba(212, 168, 83, 0.03) 300deg,
    transparent 360deg
  );
  animation: bg-rotate 30s linear infinite;
}
@keyframes bg-rotate { to { transform: rotate(360deg); } }

.pw-card {
  position: relative;
  z-index: 1;
  text-align: center;
  max-width: 420px;
  width: 92%;
  padding: 52px 44px;
  background: linear-gradient(180deg, rgba(30, 30, 40, 0.95) 0%, rgba(18, 18, 26, 0.98) 100%);
  border: 1px solid var(--border-gold);
  border-radius: var(--radius-lg);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  box-shadow: 
    0 0 80px rgba(212, 168, 83, 0.1),
    0 25px 50px -12px rgba(0, 0, 0, 0.5),
    inset 0 1px 0 rgba(255, 255, 255, 0.05);
  animation: card-enter 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes card-enter {
  from { opacity: 0; transform: translateY(40px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.pw-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 15%;
  right: 15%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
  border-radius: 2px;
}

.pw-icon {
  width: 72px;
  height: 72px;
  margin: 0 auto 28px;
  background: linear-gradient(135deg, var(--accent-gold-dim) 0%, transparent 100%);
  border: 1px solid var(--border-gold);
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.pw-icon::after {
  content: '';
  position: absolute;
  inset: -12px;
  border: 1px solid rgba(212, 168, 83, 0.1);
  border-radius: 28px;
  animation: icon-pulse 3s ease-in-out infinite;
}
@keyframes icon-pulse {
  0%, 100% { transform: scale(1); opacity: 0.5; }
  50% { transform: scale(1.05); opacity: 1; }
}
.pw-icon svg { width: 36px; height: 36px; }

.pw-title {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 6px;
  color: var(--text-primary);
  margin-bottom: 8px;
}
.pw-subtitle {
  font-size: 13px;
  color: var(--text-muted);
  letter-spacing: 2px;
  margin-bottom: 36px;
}

.pw-input-wrap {
  position: relative;
  margin-bottom: 8px;
}
.pw-input {
  width: 100%;
  padding: 18px 20px;
  font-size: 18px;
  font-family: inherit;
  letter-spacing: 8px;
  text-align: center;
  background: rgba(0, 0, 0, 0.4);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  outline: none;
  transition: all 0.3s ease;
}
.pw-input:focus {
  border-color: var(--accent-gold);
  box-shadow: 0 0 0 4px var(--accent-gold-dim), 0 0 30px rgba(212, 168, 83, 0.1);
}
.pw-input::placeholder {
  letter-spacing: 2px;
  color: var(--text-muted);
  font-size: 14px;
}

.pw-btn {
  width: 100%;
  padding: 16px;
  margin-top: 16px;
  font-size: 15px;
  font-weight: 600;
  font-family: inherit;
  letter-spacing: 4px;
  background: linear-gradient(135deg, var(--accent-gold) 0%, #c49a48 100%);
  color: var(--bg-deep);
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}
.pw-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
  transition: left 0.5s ease;
}
.pw-btn:hover::before { left: 100%; }
.pw-btn:hover {
  box-shadow: 0 8px 25px rgba(212, 168, 83, 0.35);
  transform: translateY(-2px);
}
.pw-btn:active { transform: translateY(0); }

.pw-error {
  color: var(--accent-red);
  font-size: 13px;
  margin-top: 14px;
  min-height: 20px;
}

/* ══════════ MAIN CONTAINER ══════════ */
.main-container {
  position: relative;
  z-index: 1;
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 24px;
}

/* ══════════ HERO SECTION ══════════ */
.hero-section {
  padding: 80px 0 60px;
  text-align: center;
}

/* Logo */
.logo-wrap {
  display: inline-flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 32px;
  animation: fade-in-up 0.8s ease 0.2s both;
}
@keyframes fade-in-up {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.logo-icon {
  width: 64px;
  height: 64px;
  background: linear-gradient(135deg, var(--accent-gold-dim) 0%, transparent 100%);
  border: 1px solid var(--border-gold);
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 40px var(--accent-gold-dim);
}
.logo-icon svg { width: 32px; height: 32px; }

.logo-text {
  text-align: left;
}
.logo-en {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 3px;
  color: var(--accent-gold);
  opacity: 0.7;
  text-transform: uppercase;
}
.logo-main {
  font-size: 36px;
  font-weight: 700;
  letter-spacing: 8px;
  color: var(--text-primary);
}
.logo-main .accent { color: var(--accent-gold); font-weight: 400; }
.logo-sub {
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 4px;
}

/* Hero Card */
.hero-card {
  display: block;
  position: relative;
  text-decoration: none;
  color: inherit;
  margin-top: 24px;
  animation: fade-in-up 0.8s ease 0.4s both;
}

.hero-card-bg {
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(212, 168, 83, 0.12) 0%, rgba(212, 168, 83, 0.03) 50%, transparent 100%);
  border: 1px solid var(--border-gold);
  border-radius: var(--radius-lg);
  transition: all 0.4s ease;
}
.hero-card:hover .hero-card-bg {
  background: linear-gradient(135deg, rgba(212, 168, 83, 0.18) 0%, rgba(212, 168, 83, 0.06) 50%, transparent 100%);
  box-shadow: 0 20px 60px rgba(212, 168, 83, 0.15);
  transform: translateY(-4px);
}

.hero-card-inner {
  position: relative;
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 32px;
  padding: 36px 40px;
  align-items: center;
}

.hero-date-block {
  text-align: center;
  padding-right: 32px;
  border-right: 1px solid var(--border-subtle);
}
.hero-day {
  font-size: 72px;
  font-weight: 300;
  line-height: 1;
  color: var(--accent-gold);
  letter-spacing: -2px;
  text-shadow: 0 0 40px var(--accent-gold-glow);
}
.hero-month {
  font-size: 18px;
  color: var(--text-secondary);
  margin-top: 4px;
}
.hero-weekday {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 8px;
  padding: 4px 12px;
  background: rgba(212, 168, 83, 0.1);
  border-radius: 20px;
  display: inline-block;
}

.hero-content { padding-left: 8px; }
.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  background: var(--accent-gold-dim);
  border: 1px solid var(--border-gold);
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  color: var(--accent-gold);
  margin-bottom: 16px;
}
.hero-badge-dot {
  width: 6px;
  height: 6px;
  background: var(--accent-gold);
  border-radius: 50%;
  animation: badge-pulse 2s ease-in-out infinite;
}
@keyframes badge-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.hero-title {
  font-size: 22px;
  font-weight: 600;
  line-height: 1.5;
  color: var(--text-primary);
  margin-bottom: 16px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.hero-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 20px;
}
.hero-tag {
  padding: 6px 14px;
  font-size: 12px;
  color: var(--text-secondary);
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid var(--border-subtle);
  border-radius: 6px;
}

.hero-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 24px;
  background: linear-gradient(135deg, var(--accent-gold) 0%, #c49a48 100%);
  color: var(--bg-deep);
  font-size: 14px;
  font-weight: 600;
  border-radius: 8px;
  transition: all 0.3s ease;
}
.hero-card:hover .hero-cta {
  gap: 12px;
  box-shadow: 0 8px 25px rgba(212, 168, 83, 0.3);
}

/* ══════════ ARCHIVE SECTION ══════════ */
.archive-section {
  padding: 40px 0 80px;
}

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border-subtle);
}
.section-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: 2px;
}
.section-count {
  font-size: 13px;
  color: var(--text-muted);
  background: rgba(255, 255, 255, 0.05);
  padding: 6px 14px;
  border-radius: 20px;
}

/* Archive Grid */
.archive-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}

.archive-card {
  display: block;
  text-decoration: none;
  color: inherit;
  padding: 24px;
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}
.archive-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 3px;
  height: 0;
  background: var(--accent-gold);
  transition: height 0.3s ease;
}
.archive-card:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-gold);
  transform: translateX(4px);
}
.archive-card:hover::before {
  height: 100%;
}

.archive-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.archive-date {
  font-size: 13px;
  font-weight: 600;
  color: var(--accent-gold);
  letter-spacing: 1px;
}
.archive-weekday {
  font-size: 12px;
  color: var(--text-muted);
  padding: 4px 10px;
  background: rgba(255, 255, 255, 0.03);
  border-radius: 4px;
}

.archive-title {
  font-size: 14px;
  font-weight: 500;
  line-height: 1.6;
  color: var(--text-secondary);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 14px;
}

.archive-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.archive-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.archive-tag {
  font-size: 11px;
  color: var(--text-muted);
  padding: 3px 8px;
  background: rgba(212, 168, 83, 0.08);
  border-radius: 4px;
}
.archive-link {
  font-size: 12px;
  color: var(--accent-gold);
  display: flex;
  align-items: center;
  gap: 4px;
  opacity: 0;
  transform: translateX(-8px);
  transition: all 0.3s ease;
}
.archive-card:hover .archive-link {
  opacity: 1;
  transform: translateX(0);
}

/* ══════════ FOOTER ══════════ */
.site-footer {
  padding: 40px 0;
  text-align: center;
  border-top: 1px solid var(--border-subtle);
}
.footer-logo {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-secondary);
  letter-spacing: 4px;
  margin-bottom: 12px;
}
.footer-text {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 2;
}
.footer-text a {
  color: var(--accent-gold);
  text-decoration: none;
}

/* ══════════ ANIMATIONS ══════════ */
.archive-card {
  animation: fade-in-up 0.6s ease both;
}
.archive-card:nth-child(1) { animation-delay: 0.1s; }
.archive-card:nth-child(2) { animation-delay: 0.15s; }
.archive-card:nth-child(3) { animation-delay: 0.2s; }
.archive-card:nth-child(4) { animation-delay: 0.25s; }
.archive-card:nth-child(5) { animation-delay: 0.3s; }
.archive-card:nth-child(6) { animation-delay: 0.35s; }
.archive-card:nth-child(7) { animation-delay: 0.4s; }
.archive-card:nth-child(8) { animation-delay: 0.45s; }
.archive-card:nth-child(9) { animation-delay: 0.5s; }

/* ══════════ RESPONSIVE ══════════ */
@media (max-width: 768px) {
  .hero-card-inner {
    grid-template-columns: 1fr;
    gap: 24px;
    padding: 28px 24px;
    text-align: center;
  }
  .hero-date-block {
    padding-right: 0;
    border-right: none;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border-subtle);
  }
  .hero-day { font-size: 56px; }
  .hero-title { font-size: 18px; }
  .hero-tags { justify-content: center; }
  .hero-cta { margin: 0 auto; }
  
  .archive-grid {
    grid-template-columns: 1fr;
  }
  
  .logo-wrap {
    flex-direction: column;
    gap: 12px;
  }
  .logo-text { text-align: center; }
}
</style>
</head>

function getLink(dateStr) {
  return `老盛早知道_${dateStr}.html`;
}

function extractTags(title) {
  return title.split('·').map(s => s.trim()).filter(Boolean).slice(0, 3);
}

// ══════════ RENDER ══════════
const latest = reports[0];

// Hero Card
document.getElementById('hero-day').textContent = parseInt(latest.date.slice(6, 8));
document.getElementById('hero-month').textContent = parseInt(latest.date.slice(4, 6)) + '月';
document.getElementById('hero-weekday').textContent = latest.weekday;
document.getElementById('hero-title').textContent = latest.title;
document.getElementById('hero-card').href = getLink(latest.date);

const heroTags = extractTags(latest.title).map(t => `<span class="hero-tag">${t}</span>`).join('');
document.getElementById('hero-tags').innerHTML = heroTags;

// Archive Grid
const archive = reports.slice(1);
document.getElementById('archive-count').textContent = archive.length + ' 期';

const archiveGrid = document.getElementById('archive-grid');
archive.forEach(r => {
  const tags = extractTags(r.title);
  const tagsHtml = tags.map(t => `<span class="archive-tag">${t}</span>`).join('');
  
  const html = `
    <a class="archive-card" href="${getLink(r.date)}">
      <div class="archive-card-header">
        <span class="archive-date">${r.date.slice(0,4)}.${r.date.slice(4,6)}.${r.date.slice(6,8)}</span>
        <span class="archive-weekday">${r.weekday}</span>
      </div>
      <div class="archive-title">${r.title}</div>
      <div class="archive-footer">
        <div class="archive-tags">${tagsHtml}</div>
        <span class="archive-link">
          查看
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M2 6h8M7 3l3 3-3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
      </div>
    </a>
  `;
  archiveGrid.innerHTML += html;
});
