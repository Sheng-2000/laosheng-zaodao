name: Deploy to Tencent COS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install coscmd
        run: pip install coscmd

      - name: Configure coscmd
        run: |
          coscmd config -a ${{ secrets.TENCENT_SECRET_ID }} -s ${{ secrets.TENCENT_SECRET_KEY }} -b laosheng-1425032065 -r ap-nanjing

      - name: Sync files to COS
        run: |
          coscmd sync -r --delete --exclude ".git/*" --exclude ".github/*" --exclude ".codebuddy/*" --exclude ".workbuddy/*" --exclude "sync_github.sh" --exclude "生成规范.md" --exclude "template.html" ./ /
