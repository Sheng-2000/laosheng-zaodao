name: Deploy to Tencent COS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync to COS
        uses: tencentyun/cos-action@v1
        with:
          secret_id: ${{ secrets.TENCENT_SECRET_ID }}
          secret_key: ${{ secrets.TENCENT_SECRET_KEY }}
          bucket: laosheng-1425032065
          region: ap-nanjing
          src: ./
          dest: /
          exclude: |
            .git/**
            .github/**
            .codebuddy/**
            .workbuddy/**
            sync_github.sh
            生成规范.md
            template.html
          delete: true
